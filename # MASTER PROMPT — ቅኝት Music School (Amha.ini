## THE PROJECT

Build me a visually stunning, mobile-friendly, single-file interactive web app called **"ቅኝት Music School" (Kiñit Music School)** that teaches Ethiopian/Amharic music from absolute scratch, using the four traditional kiñit pentatonic scales mapped to western note names (C, D, E, F, G, A, B).

The app teaches **four instruments**, each with its own dedicated section:

1. **Bass Guitar** (4 strings: E–A–D–G)
2. **Keyboard / Piano**
3. **Acoustic Guitar** ("box guitar", 6 strings: E–A–D–G–B–E)
4. **Lead Guitar** (6 strings, focused on melody lines, solos, and krar/masinko-style phrasing)

And **three learner levels** for each instrument:

- **ጀማሪ (Beginner)** — assumes zero musical knowledge
- **መካከለኛ (Intermediate)**
- **ባለሙያ (Expert)**

## THE MUSICAL FOUNDATION — THE FOUR KIÑIT SCALES

All lessons are built on the four traditional Amharic kiñit scales. Use these note mappings (rooted on C, but include a root-note selector so pupils can transpose):

- **ትዝታ (Tizita) Major:** C – D – E – G – A
- **ባቲ (Bati) Major:** C – E – F – G – B
- **አምባሰል (Ambassel):** C – D♭ – F – G – A♭
- **አንቺሆዬ (Anchihoye):** C – D♭ – F – G♭ – A

Include a short note in each lesson that traditional tuning contains microtonal shades that western notes only approximate.

## CURRICULUM STRUCTURE

**Beginner (per instrument):**
- What is a note? What is a scale? Explained simply, in both Amharic and English.
- The 7 western note names (C D E F G A B) and where they live on THIS instrument.
- Learning Tizita major first (it is the friendliest kiñit), one note at a time.
- Simple exercises: play the scale ascending, descending, then a 3-note melody fragment

**Intermediate (per instrument):**
- All four kiñit scales on the instrument.
- Rhythm training: 6/8 and 12/8 feels common in Ethiopian music (chik-chika groove).
- Playing a short traditional-style melody in each kiñit.
- Bass: root–fifth grooves under each kiñit. Keyboard: left-hand root + right-hand melody. Box guitar: strumming + fingerpicking patterns. Lead: sliding, hammer-ons, bending into scale notes.

**Expert (per instrument):**
- Transposing every kiñit to any root note.
- Improvisation exercises inside each kiñit (call-and-response, like azmari style).
- Ethio-jazz flavor: combining kiñit scales with 7th chords (reference the Mulatu Astatke sound conceptually — do not reproduce any copyrighted melodies; all example melodies must be original).
- Speed/accuracy challenges with a built-in metronome.

## VISUAL REQUIREMENTS — MAKE EVERY NOTE VISUALLY APPEALING

This must look premium and high-intensity, not like a plain tutorial page:

- **Interactive fretboard diagrams** for bass, box guitar, and lead guitar: SVG fretboards where scale notes light up with glowing dots, the root note in a distinct color, note names (C, D, E...) written inside each dot, and Amharic labels above.
- **Interactive piano keyboard** for the keyboard section: keys light up and animate when played.
- **Every note is clickable and PLAYS REAL SOUND** using the Web Audio API (synthesize tones — a rounder/deeper tone for bass, plucked-style envelope for guitars, cleaner tone for keyboard).
- A **"Play Scale" button** that plays the selected kiñit slowly while each note lights up in sequence, so pupils can watch and listen together.
- A built-in **metronome** with adjustable tempo.
- Ethiopian-inspired aesthetic: rich colors drawn from Ethiopian art and textiles (deep greens, golds, warm earth reds), elegant typography that renders Amharic script (Geʽez fidel) beautifully, smooth animations, dark premium background so the glowing notes pop.
- Fully **bilingual**: every heading and instruction in Amharic first, English underneath.
- **Mobile-friendly**: everything must work well with touch on a phone screen.

## TECHNICAL REQUIREMENTS

- One single-file React artifact (or single HTML file) — no external assets, no external audio files, no localStorage.
- All sound generated with the Web Audio API.
- Navigation: Home screen → choose instrument → choose level → lessons. A progress feel (lesson numbers, "next lesson" buttons) is enough; do not rely on saved state.
- Keep all melodies 100% original — do not reproduce any existing song.

